services:
  postgres:
    image: postgres:17-alpine
    container_name: app-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: safetydb
      POSTGRES_USER: safety
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety -d safetydb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    image: bitnamilegacy/pgbouncer:latest
    container_name: app-pgbouncer-dev
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: safetydb
      POSTGRESQL_USERNAME: safety
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      PGBOUNCER_DATABASE: safetydb
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 100
      PGBOUNCER_DEFAULT_POOL_SIZE: 10
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: app-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.dev
    container_name: app-server-dev
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://safety:${POSTGRES_PASSWORD:-devpassword}@pgbouncer:6432/safetydb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - JWT_EXPIRES_IN=8h
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./apps/server:/app/apps/server
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      - ./turbo.json:/app/turbo.json
      - server-node-modules:/app/node_modules
      - server-app-node-modules:/app/apps/server/node_modules
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: bun run --filter server dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: app-web-dev
    env_file:
      - ./apps/web/.env.local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - API_URL=http://server:4000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      - ./turbo.json:/app/turbo.json
      - web-node-modules:/app/node_modules
      - web-app-node-modules:/app/apps/web/node_modules
      - web-next-cache:/app/apps/web/.next
    networks:
      - app-network
    depends_on:
      - server
    command: bun run --filter web dev

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    container_name: app-admin-dev
    env_file:
      - ./apps/admin/.env.local
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - API_URL=http://server:4000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      - ./turbo.json:/app/turbo.json
      - admin-node-modules:/app/node_modules
      - admin-app-node-modules:/app/apps/admin/node_modules
      - admin-next-cache:/app/apps/admin/.next
    networks:
      - app-network
    depends_on:
      - server
    command: bun run --filter admin dev

networks:
  app-network:
    driver: bridge
    name: app-network-dev

volumes:
  postgres_dev_data:
  redis_dev_data:
  server-node-modules:
  server-app-node-modules:
  web-node-modules:
  web-app-node-modules:
  web-next-cache:
  admin-node-modules:
  admin-app-node-modules:
  admin-next-cache:
