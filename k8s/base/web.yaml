apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: huyouan
  labels: { app: web }
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: ghcr.io/c0dypeng/huyouan-web:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000, name: http }]
          envFrom:
            - configMapRef: { name: huyouan-config }
          env:
            - name: API_URL
              value: http://server:4000
            - name: NEXT_PUBLIC_API_URL
              value: http://huyouan.local
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: huyouan-secrets, key: JWT_SECRET } }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: huyouan
spec:
  selector: { app: web }
  ports:
    - port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: huyouan
  labels: { app: admin }
spec:
  replicas: 1
  selector:
    matchLabels: { app: admin }
  template:
    metadata:
      labels: { app: admin }
    spec:
      containers:
        - name: admin
          image: ghcr.io/c0dypeng/huyouan-admin:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3001, name: http }]
          envFrom:
            - configMapRef: { name: huyouan-config }
          env:
            - name: PORT
              value: "3001"
            - name: API_URL
              value: http://server:4000
            - name: NEXT_PUBLIC_API_URL
              value: http://huyouan.local
          readinessProbe:
            httpGet: { path: /login, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: huyouan
spec:
  selector: { app: admin }
  ports:
    - port: 3001
      targetPort: http
