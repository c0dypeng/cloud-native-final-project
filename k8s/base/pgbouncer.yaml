apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: huyouan
spec:
  replicas: 2
  selector:
    matchLabels: { app: pgbouncer }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels: { app: pgbouncer }
    spec:
      containers:
        - name: pgbouncer
          image: bitnamilegacy/pgbouncer:latest
          ports: [{ containerPort: 6432, name: pg }]
          env:
            - { name: POSTGRESQL_HOST, value: postgres }
            - { name: POSTGRESQL_PORT, value: "5432" }
            - { name: POSTGRESQL_DATABASE, value: safetydb }
            - { name: POSTGRESQL_USERNAME, value: safety }
            - name: POSTGRESQL_PASSWORD
              valueFrom: { secretKeyRef: { name: huyouan-secrets, key: POSTGRES_PASSWORD } }
            - { name: PGBOUNCER_POOL_MODE, value: transaction }
            - { name: PGBOUNCER_MAX_CLIENT_CONN, value: "200" }
            - { name: PGBOUNCER_DEFAULT_POOL_SIZE, value: "20" }
          readinessProbe:
            tcpSocket: { port: pg }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 256Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: huyouan
spec:
  selector: { app: pgbouncer }
  ports:
    - port: 6432
      targetPort: pg
