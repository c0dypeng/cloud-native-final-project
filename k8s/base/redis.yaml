apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: huyouan
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports: [{ containerPort: 6379, name: redis }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 384Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: huyouan
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: redis
