name: e2e
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 18 * * *" # nightly UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: end-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POSTGRES_PASSWORD: ci-password
      JWT_SECRET: ci-test-secret-with-enough-length-for-jwt-padding-padding-pad
      CORS_ORIGIN: "http://localhost:3000,http://localhost:3001"
      DATABASE_URL: postgresql://safety:ci-password@localhost:5432/safetydb
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: changeme
      SEED_USER_PASSWORD: password123
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: safetydb
          POSTGRES_USER: safety
          POSTGRES_PASSWORD: ci-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U safety -d safetydb"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.9 }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-bun-pw-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: apply db schema
        working-directory: packages/database
        run: bun run db:push --force
      - name: seed demo data
        working-directory: packages/database
        run: bun run seed
      - name: install Playwright browsers
        run: bun run e2e:install
      # Start backend with Bun so .ts deps (drizzle schema files imported by
      # @workspace/database via package.json exports) resolve at runtime.
      # Web and admin use `next dev` to avoid Next.js standalone packaging
      # gotchas with the route-group structure in CI.
      - name: start API + web + admin in background
        run: |
          set -e
          (cd apps/server && REDIS_URL=redis://localhost:6379 PORT=4000 bun src/index.ts > /tmp/server.log 2>&1 &)
          (cd apps/web && API_URL=http://localhost:4000 NEXT_PUBLIC_API_URL=http://localhost:3000 NEXT_PUBLIC_SITE_URL=http://localhost:3000 PORT=3000 bun next dev > /tmp/web.log 2>&1 &)
          (cd apps/admin && API_URL=http://localhost:4000 NEXT_PUBLIC_API_URL=http://localhost:3001 PORT=3001 bun next dev > /tmp/admin.log 2>&1 &)
      - name: wait for services
        run: |
          for i in {1..120}; do
            if curl -sf http://localhost:4000/api/health \
               && curl -sf -o /dev/null http://localhost:3000/login \
               && curl -sf -o /dev/null http://localhost:3001/login; then
              echo "services ready after ${i}x2s"
              exit 0
            fi
            sleep 2
          done
          echo "services did not start in time"; tail -n 200 /tmp/server.log /tmp/web.log /tmp/admin.log; exit 1
      - run: bun run e2e
        env:
          E2E_WEB_URL: http://localhost:3000
          E2E_ADMIN_URL: http://localhost:3001
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: service-logs
          path: |
            /tmp/server.log
            /tmp/web.log
            /tmp/admin.log
          if-no-files-found: ignore
