global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: huyouan
    env: dev

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: server
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:4000
        labels:
          service: api-server
